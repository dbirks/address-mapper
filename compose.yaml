services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    command: pnpm run dev

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MAPBOX_API_KEY=${MAPBOX_API_KEY}
    command: uvicorn address_mapper_api.upload_image:app --reload --host 0.0.0.0 --port 8000